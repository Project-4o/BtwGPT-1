# BtwGPT-1 Model Configuration
# Architecture: Mixtral-compatible MoE Transformer (~150M params)

model:
  name: "BtwGPT-1"
  architecture: "MixtralForCausalLM"
  hidden_size: 768
  intermediate_size: 2048
  num_hidden_layers: 16
  num_attention_heads: 12
  num_key_value_heads: 4
  max_position_embeddings: 4096
  vocab_size: 32000
  rms_norm_eps: 1.0e-5
  rope_theta: 10000.0
  num_local_experts: 8
  num_experts_per_tok: 2
  hidden_act: "silu"
  tie_word_embeddings: false
  initializer_range: 0.02

training:
  batch_size: 8
  gradient_accumulation_steps: 4
  learning_rate: 3.0e-4
  weight_decay: 0.1
  max_grad_norm: 1.0
  warmup_steps: 1000
  max_steps: 100000
  fp16: true
  seed: 42
  save_steps: 5000
  eval_steps: 1000
  logging_steps: 100
  early_stop_patience: 5

data:
  max_seq_length: 4096
  tokenizer_model: "tokenizer/btwgpt.model"
  train_data: "data/train/"
  eval_data: "data/eval/"
  system_prompt: "config/system_prompt.txt"
